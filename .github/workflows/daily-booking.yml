name: Daily Hotdesk Booking

on:
  schedule:
    # Run at 00:01 Warsaw time (UTC+2 in summer, UTC+1 in winter)
    # Using 22:01 UTC to account for CEST (UTC+2)
    # Runs daily to keep refresh token alive (skips weekends gracefully)
    - cron: '1 22 * * *'  # Every day at 22:01 UTC = 00:01 CEST
  workflow_dispatch:  # Allow manual trigger
    inputs:
      dry_run:
        description: 'Dry run (do not actually book)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOTDESK_BASE_URL: https://hotdesk.speednet.pl
  LOCATION_ID: 8f78f4e5-1cd6-40b7-a91e-34cab6768732
  PREFERRED_DESKS: S05,S15,S10,S14
  BOOKING_SUBJECT: "Tim codziennie w biurze"

jobs:
  book-desk:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing token file to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Get current time info
        run: |
          echo "Current UTC time: $(date -u)"
          echo "Target booking date: $(date -u -d 'tomorrow' +%Y-%m-%d)"

      - name: Run booking script
        id: booking
        env:
          REFRESH_TOKEN: ${{ secrets.HOTDESK_REFRESH_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python .github/scripts/book_desk.py

      - name: Commit rotated token
        if: always() && env.NEW_REFRESH_TOKEN != ''
        env:
          NEW_REFRESH_TOKEN: ${{ env.NEW_REFRESH_TOKEN }}
        run: |
          echo "Token was rotated, saving to repo..."
          mkdir -p .github/data
          echo "$NEW_REFRESH_TOKEN" > .github/data/refresh_token.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/data/refresh_token.txt
          git diff --staged --quiet || git commit -m "chore: update rotated refresh token [skip ci]"
          git push
          echo "New token committed to repo"
